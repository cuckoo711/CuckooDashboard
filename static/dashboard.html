<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Dashboard</title>
    <style>
        :root {
            /* 配色取自背景插画：靛蓝夜色 + 珊瑚玫瑰 + 暖金 + 紫罗兰 + 月光青 */
            --border: rgba(150,120,190,0.3);
            --text: #ffffff;
            --text2: rgba(228,218,240,0.95);
            --crimson: #cf5b68;
            --crimson-light: #e0808c;
            --gold: #e8c98f;
            --accent: #8a7cc4;
            --accent2: #c2a8e0;
            --green: #5fa89e;
            --ts: 0 1px 4px rgba(0,0,0,0.8), 0 0 12px rgba(0,0,0,0.5);
            --ts2: 0 1px 3px rgba(0,0,0,0.7);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; }
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text); text-shadow: var(--ts);
        }
        .grid {
            width:100%; height:100%;
            display:grid;
            grid-template-rows: 44px repeat(15, minmax(0,1fr));
            grid-template-columns: repeat(16, minmax(0,1fr));
            gap:8px; padding:12px 14px;
        }

        /* ── Header ── */
        .hdr { grid-row:1; grid-column:1/-1; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; }
        .hdr-l { display:flex; align-items:center; gap:10px; }
        .hdr-l .mark {
            width:20px; height:20px; border:2px solid var(--crimson); border-radius:50%; position:relative;
            box-shadow: 0 0 8px rgba(181,52,42,0.4); cursor:pointer; transition:border-color 0.4s, box-shadow 0.4s;
        }
        .hdr-l .mark::after {
            content:''; position:absolute; top:3px; left:3px;
            width:10px; height:10px; background:var(--crimson); border-radius:50%;
            transition:background 0.4s;
        }
        body.mono {
            filter:none; color:#1a1a2e; text-shadow:none;
        }
        body.mono .grid { background:none; }
        body.mono .card {
            background:#ffffff; backdrop-filter:none; -webkit-backdrop-filter:none;
            border:1px solid #e2e2e8; box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        body.mono .card-head-l { color:#1a1a2e; text-shadow:none; }
        body.mono .card-head-l .bar { background:#4a4a6a; }
        body.mono .card-head-r { color:#6a6a8a; text-shadow:none; }
        body.mono .card-foot { border-color:#ededf0; }
        body.mono .card-foot-l, body.mono .card-foot-r { color:#6a6a8a; text-shadow:none; }
        body.mono .card-foot-l b, body.mono .card-foot-r b { color:#1a1a2e; }

        /* 纯净模式 - Header */
        body.mono .hdr h1 { color:#1a1a2e; text-shadow:none; }
        body.mono .hdr-date { color:#4a4a6a; text-shadow:none; }
        body.mono .hdr-clock-box { background:#f0f0f5; border-color:#e2e2e8; box-shadow:none; }
        body.mono .hdr-clock-ampm, body.mono .hdr-clock { color:#1a1a2e; text-shadow:none; }
        body.mono .hdr-badge { color:#6a6a8a; text-shadow:none; }
        body.mono .mark { border-color:#4a4a6a; box-shadow:none; }
        body.mono .mark::after { background:#4a4a6a; }

        /* 纯净模式 - 系统信息 */
        body.mono .hw-main-pct { color:#1a1a2e; }
        body.mono .hw-main-sub { color:#8a8aa0; text-shadow:none; }
        body.mono .hw-main-name { color:#3a3a5a; text-shadow:none; }
        body.mono .hw-ring-bg { stroke:#e8e8f0 !important; }

        /* 纯净模式 - 网络 & 开机 */
        body.mono .net-icon.up { color:#6a6a8a; }
        body.mono .net-icon.down { color:#4a7a5a; }
        body.mono .net-value { color:#1a1a2e; }
        body.mono .net-unit { color:#8a8aa0; }
        body.mono .uptime-val { color:#1a1a2e; }

        /* 纯净模式 - 磁盘 */
        body.mono .dk-disk-name { color:#4a4a6a; text-shadow:none; }
        body.mono .dk-disk-info { color:#6a6a8a; text-shadow:none; }
        body.mono .dk-part-letter { color:#4a4a6a; text-shadow:none; }
        body.mono .dk-part-track { background:#f0f0f5; }
        body.mono .dk-part-fill.ok { background:linear-gradient(90deg, #5a9a6a, #7aba8a); }
        body.mono .dk-part-fill.warn { background:linear-gradient(90deg, #c09040, #d0a850); }
        body.mono .dk-part-fill.danger { background:linear-gradient(90deg, #c04040, #d06060); }

        /* 纯净模式 - Vibe Coding */
        body.mono .ring-bg { stroke:#e8e8f0 !important; }
        body.mono .ring-pct { color:#1a1a2e; }
        body.mono .ring-label { color:#8a8aa0; text-shadow:none; }
        body.mono .today-big { color:#c04040; }
        body.mono .today-big-sub { color:#8a8aa0; text-shadow:none; }
        body.mono .stacked-bar { background:#f0f0f5; }
        body.mono .stacked-seg.s-in { background:#7b6cc4; }
        body.mono .stacked-seg.s-cache { background:#4a3d8a; }
        body.mono .stacked-seg.s-out { background:#c04040; }
        body.mono .leg-row { color:#6a6a8a; text-shadow:none; }
        body.mono .leg-row b { color:#1a1a2e; }
        body.mono .leg-row .leg-pct { color:#8a8aa0; }
        body.mono .bar-name { color:#6a6a8a; text-shadow:none; }
        body.mono .bar-track { background:#f0f0f5; }
        body.mono .bar-fill.f1 { background:#7b6cc4; }
        body.mono .bar-fill.f2 { background:#c04040; }
        body.mono .bar-fill.f3 { background:#d0a040; }
        body.mono .bar-info .v { color:#1a1a2e; }
        body.mono .bar-info .s { color:#8a8aa0; text-shadow:none; }
        body.mono .today-sep { background:#ededf0; }
        body.mono .vibe-toggle { background:#f0f0f5; border-color:#e2e2e8; color:#6a6a8a; }
        body.mono .vibe-toggle .dot { background:#8a8aa0; }
        body.mono .vibe-toggle.active { background:rgba(74,122,90,0.12); border-color:rgba(74,122,90,0.4); color:#4a7a5a; }
        body.mono .vibe-toggle.active .dot { background:#4a7a5a; }

        /* 纯净模式 - 播放器 */
        body.mono .lyric-line { color:#8a8aa0; text-shadow:none; }
        body.mono .lyric-line.current { color:#1a1a2e; }
        body.mono .lyric-line.near { color:#5a5a7a; }
        body.mono .lyric-idle { color:#aaa; text-shadow:none; }
        body.mono .lyric-offset-btn { background:#f0f0f5; border-color:#e2e2e8; color:#6a6a8a; }
        body.mono .lyric-offset-val { color:#6a6a8a; text-shadow:none; }
        body.mono .lyric-reload-btn { background:#f0f0f5; border-color:#e2e2e8; color:#6a6a8a; }
        body.mono .player-btn { background:#f0f0f5; border-color:#d0d0d8; color:#6a6a8a; }
        body.mono .player-btn:hover { background:#e2e2e8; color:#1a1a2e; border-color:#c0c0c8; }

        /* 纯净模式 - GitHub */
        body.mono .gh-month { color:#8a8aa0; text-shadow:none; }
        body.mono .gh-days span { color:#8a8aa0; text-shadow:none; }
        body.mono .gh-cell { background:#f0f0f5; }
        body.mono .gh-l1 { background:#c8c0e8; }
        body.mono .gh-l2 { background:#a898d8; }
        body.mono .gh-l3 { background:#8878c0; }
        body.mono .gh-l4 { background:#6858a8; }
        body.mono #ghTotal { color:#4a3d8a; }
        .hdr h1 { font-size:16px; font-weight:700; letter-spacing:0.5px; }

        .hdr-center { display:flex; align-items:center; justify-content:center; }
        .hdr-clock-box {
            display:flex; align-items:center; gap:0;
            background: rgba(255,255,255,0.05);
            backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
            border:1px solid rgba(255,255,255,0.10);
            box-shadow:0 2px 12px rgba(0,0,0,0.2);
            border-radius:10px; padding:4px 18px;
        }
        .hdr-clock-ampm {
            font-size:13px; font-weight:700; color:var(--text);
            width:32px; text-align:left; margin-right:8px;
        }
        .hdr-clock {
            font-size:22px; font-weight:700; font-variant-numeric:tabular-nums;
            letter-spacing:1px;
        }
        .hdr-badge {
            font-size:13px; font-weight:700;
            width:36px; text-align:right; margin-left:8px;
            color:var(--gold);
            display:none;
        }
        .hdr-date {
            font-size:15px; font-weight:500; color:var(--text);
            text-shadow:var(--ts2); white-space:nowrap; text-align:right;
        }

        /* ── Card ── */
        .card {
            background: linear-gradient(135deg, rgba(5,3,12,0.65) 0%, rgba(10,7,20,0.65) 100%);
            backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
            border-radius:14px; padding:12px 14px;
            display:flex; flex-direction:column;
            border:1px solid rgba(255,255,255,0.06);
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
            position:relative; overflow:hidden;
        }
        /* 有 footer 的卡片：底部内边距交给 footer 自己撑起，避免叠加两层间距 */
        .card:has(.card-foot) { padding-bottom:0; }
        /* ── 统一卡片结构：头（左/中/右）+ 内容 + 脚（左/中/右，可不显示）── */
        .card-head { position:relative; display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; height:18px; flex-shrink:0; }
        .card-head-l {
            display:flex; align-items:center; gap:5px; flex-shrink:0;
            font-size:10px; font-weight:600; color:var(--text2);
            letter-spacing:0.8px; text-shadow:var(--ts2); white-space:nowrap;
        }
        .card-head-l .bar { width:3px; height:10px; background:var(--accent); border-radius:1px; flex-shrink:0; }
        .card-head-c {
            position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
            max-width:55%; font-size:11px; font-weight:600; color:var(--text);
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap; pointer-events:none;
        }
        .card-head-r { flex-shrink:0; font-size:10px; color:var(--text2); text-shadow:var(--ts2); text-align:right; white-space:nowrap; display:flex; align-items:center; gap:5px; }

        .card-body { flex:1; min-height:0; min-width:0; display:flex; flex-direction:column; justify-content:center; }

        .card-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; height:36px; border-top:1px solid var(--border); flex-shrink:0; }
        .card-foot-l { flex-shrink:0; font-size:10px; color:var(--text2); text-shadow:var(--ts2); white-space:nowrap; }
        .card-foot-c { flex:1; min-width:0; text-align:center; font-size:10px; color:var(--text2); }
        .card-foot-r { flex-shrink:0; font-size:10px; color:var(--text2); text-shadow:var(--ts2); text-align:right; white-space:nowrap; }
        .card-foot-l b, .card-foot-r b { font-weight:700; }

        /* ── Vibe 状态切换按钮（Coding / Chilling）── */
        .vibe-toggle {
            display:flex; align-items:center; gap:4px; flex-shrink:0; cursor:pointer;
            font-size:9px; font-weight:700; letter-spacing:0.3px;
            padding:2px 8px; border-radius:10px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            color:var(--text2); transition:background 0.25s, border-color 0.25s, color 0.25s;
            -webkit-tap-highlight-color:transparent; user-select:none;
        }
        .vibe-toggle .dot {
            width:6px; height:6px; border-radius:50%; flex-shrink:0;
            background:var(--text2); transition:background 0.25s, box-shadow 0.25s;
        }
        .vibe-toggle.active {
            background:rgba(95,168,158,0.18); border-color:rgba(95,168,158,0.45); color:var(--green);
        }
        .vibe-toggle.active .dot {
            background:var(--green); box-shadow:0 0 6px rgba(95,168,158,0.8);
            animation:vibe-pulse 1.4s ease-in-out infinite;
        }
        @keyframes vibe-pulse {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }

        /* ── 歌词重载按钮 ── */
        .lyric-reload-btn {
            display:flex; align-items:center; gap:3px; flex-shrink:0; cursor:pointer;
            font-size:9px; font-weight:700; letter-spacing:0.3px;
            padding:2px 8px; border-radius:10px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            color:var(--text2); transition:background 0.25s, border-color 0.25s, color 0.25s;
            -webkit-tap-highlight-color:transparent; user-select:none;
        }
        .lyric-reload-btn .reload-icon {
            font-size:11px; line-height:1; flex-shrink:0;
        }
        .player-ctrl { display:flex; align-items:center; gap:4px; margin-left:6px; }
        .player-btn {
            width:26px; height:26px; border-radius:6px; border:1px solid rgba(255,255,255,0.12);
            background:rgba(255,255,255,0.08); color:var(--text2); font-size:12px;
            display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
            padding:0; transition:background 0.2s, color 0.2s; line-height:1;
            -webkit-tap-highlight-color:transparent; user-select:none;
        }
        .player-btn:hover { background:rgba(255,255,255,0.2); color:var(--text); border-color:rgba(255,255,255,0.25); }
        .player-btn:active { background:rgba(255,255,255,0.3); transform:scale(0.95); }

        /* ── 骨架屏 ── */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.15) 37%, rgba(255,255,255,0.06) 63%);
            background-size: 400% 100%;
            animation: skel-shimmer 1.6s ease-in-out infinite;
            border-radius:4px; flex-shrink:0;
        }
        @keyframes skel-shimmer {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ── 网络状态（系统信息右侧，行2-4）── */
        .netCard { grid-row:2/5; grid-column:7/9; padding:6px 7px; }
        .net-rows { justify-content:center; gap:8px; }
        .net-row { display:flex; align-items:center; justify-content:space-between; gap:5px; flex-wrap:nowrap; white-space:nowrap; }
        .net-icon { font-size:13px; width:14px; text-align:center; flex-shrink:0; }
        .net-icon.up { color:var(--accent2); }
        .net-icon.down { color:var(--green); }
        .net-label { display:none; }
        .net-value { font-size:15px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; white-space:nowrap; margin-left:auto; }
        .net-unit { font-size:9px; color:var(--text2); margin-left:2px; font-weight:400; }

        /* ── 开机时间（网络下方，行5-6）── */
        .uptimeCard { grid-row:5/7; grid-column:7/9; padding:6px 7px; }
        .uptime-body { flex-direction:column; align-items:center; justify-content:center; }
        .uptime-val { font-size:12px; font-weight:700; color:var(--text); line-height:1.2; }

        /* ── Token Plan & 今日消耗（右栏，行2-11）── */
        .tokenCard { grid-row:2/11; grid-column:9/17; }
        .today-top { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
        .today-big { font-size:26px; font-weight:700; color:var(--crimson-light); line-height:1; }
        .today-big-sub { font-size:10px; color:var(--text2); text-shadow:var(--ts2); }

        .stacked-wrap { margin-bottom:6px; }
        .stacked-bar { display:flex; height:12px; border-radius:5px; overflow:hidden; background:rgba(255,255,255,0.04); }
        .stacked-seg { height:100%; transition:width 1s ease; min-width:0; }
        .stacked-seg.s-in { background:var(--accent); }
        .stacked-seg.s-out { background:var(--crimson); }
        .stacked-seg.s-cache { background:#5e4f96; }

        .legend { display:flex; flex-direction:column; gap:2px; }
        .leg-row { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text2); text-shadow:var(--ts2); }
        .leg-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
        .leg-row b { color:#fff; font-weight:600; margin-left:auto; font-variant-numeric:tabular-nums; }
        .leg-row .leg-pct { width:36px; text-align:right; font-size:9px; color:var(--text2); }

        .today-sep { height:1px; background:var(--border); margin:4px 0; }

        /* ── Token Plan ── */
        .combined { display:flex; gap:10px; flex:1; min-height:0; }
        .combined-left { display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
        .combined-right { flex:1; display:flex; flex-direction:column; justify-content:center; gap:4px; min-width:0; }
        .ring-svg { transform:rotate(-90deg); }
        .ring-bg { fill:none; stroke:rgba(255,255,255,0.08); stroke-width:9; }
        .ring-fg { fill:none; stroke:var(--crimson); stroke-width:9; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
        .ring-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
        .ring-pct { font-size:18px; font-weight:700; color:var(--gold); transition:color 0.3s; }
        .ring-label { font-size:8px; color:var(--text2); margin-top:1px; text-shadow:var(--ts2); }

        /* ── Model Bars ── */
        .bar-row { display:flex; align-items:center; gap:4px; }
        .bar-name { width:60px; font-size:9px; color:var(--text2); text-align:right; flex-shrink:0; text-shadow:var(--ts2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .bar-track { flex:1; height:12px; background:rgba(255,255,255,0.04); border-radius:4px; overflow:hidden; }
        .bar-fill { height:100%; border-radius:4px; transition:width 1s ease; }
        .bar-fill.f1 { background:var(--accent); }
        .bar-fill.f2 { background:var(--crimson); }
        .bar-fill.f3 { background:var(--gold); }
        .bar-info { width:64px; font-size:8px; flex-shrink:0; }
        .bar-info .v { font-weight:600; color:var(--text); }
        .bar-info .s { color:var(--text2); text-shadow:var(--ts2); }

        /* ── 系统信息（左上，行2-5）── */
        .sysCard { grid-row:2/7; grid-column:1/7; overflow:visible; }
        #sysMain { justify-content:center; align-items:center; }

        /* CPU / 内存 / 独显，纵向三列（名字在环下方） */
        .hw-main { display:grid; grid-template-columns:repeat(3, 1fr); gap:4px 8px; justify-items:center; }
        .hw-main-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:2px 4px; min-width:0; }
        .hw-main-ring { position:relative; flex-shrink:0; }
        .hw-main-ring svg { display:block; }
        .hw-main-ring .hw-ring-bg { fill:none; stroke:rgba(255,255,255,0.07); stroke-width:7; }
        .hw-main-ring .hw-ring-fg { fill:none; stroke-width:7; stroke-linecap:round; transition:stroke-dasharray 1.5s ease, stroke 0.5s; }
        .hw-main-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none; display:flex; flex-direction:column; align-items:center; }
        .hw-main-pct { font-size:16px; font-weight:700; color:#fff; line-height:1; display:block; }
        .hw-main-sub { font-size:9px; color:var(--text2); text-shadow:var(--ts2); display:block; line-height:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:2px; }
        .hw-main-name { font-size:10px; font-weight:600; color:var(--text); text-shadow:var(--ts2); display:block; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* ── 磁盘（左栏，行6-10，两列布局）── */
        .diskCard { grid-row:7/11; grid-column:1/9; }
        .dk-section { display:grid; grid-template-columns:1fr 1fr; gap:2px 16px; align-content:center; }
        .dk-disk-group { min-width:0; }
        .dk-disk-hd { display:flex; align-items:baseline; gap:4px; margin-bottom:1px; margin-top:6px; }
        .dk-disk-group:nth-child(-n+2) .dk-disk-hd { margin-top:0; }
        .dk-disk-name { font-size:9px; color:var(--text2); text-shadow:var(--ts2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0; max-width:100px; }
        .dk-disk-info { font-size:8px; color:var(--text2); text-shadow:var(--ts2); margin-left:auto; font-variant-numeric:tabular-nums; white-space:nowrap; flex-shrink:0; }
        .dk-part-row { display:flex; align-items:center; gap:4px; margin-bottom:0; padding-left:8px; }
        .dk-part-letter { width:14px; font-size:9px; color:var(--text2); text-shadow:var(--ts2); text-align:center; flex-shrink:0; font-weight:600; }
        .dk-part-track { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
        .dk-part-fill { height:100%; border-radius:3px; transition:width 2s ease; }
        .dk-part-fill.ok { background:linear-gradient(90deg, #5fa89e, #83c4bb); }
        .dk-part-fill.warn { background:linear-gradient(90deg, #d1a15c, #e8c98f); }
        .dk-part-fill.danger { background:linear-gradient(90deg, #cf5b68, #e0808c); }
        .dk-part-info { font-size:8px; color:var(--text2); text-shadow:var(--ts2); font-variant-numeric:tabular-nums; white-space:nowrap; flex-shrink:0; }

        /* ── 歌词播放器（左栏，行12-16）── */
        .lyric-wrap { grid-row:11/17; grid-column:1/9; display:flex; flex-direction:column; }
        .lyric-wrap .card-foot-l, .lyric-wrap .card-foot-r { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; }
        .lyric-wrap .card-foot-r { text-align:right; }

        .lyric-text {
            flex:1; position:relative; min-height:0; overflow:hidden;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }
        .lyric-scroll {
            position:absolute; left:0; right:0; top:0;
            transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            will-change: transform;
        }
        .lyric-line {
            height:30px; line-height:30px;
            font-size:12px; color:var(--text2); text-shadow:var(--ts2);
            text-align:center; opacity:0.45;
            transition:opacity 0.4s ease, font-size 0.4s ease, color 0.4s ease, font-weight 0.4s ease;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .lyric-line.current { font-size:17px; font-weight:700; color:var(--text); opacity:1; }
        .lyric-line.near { opacity:0.7; font-size:13px; }
        .lyric-idle { font-size:12px; color:var(--text2); text-shadow:var(--ts2); text-align:center; position:absolute; top:50%; left:0; right:0; transform:translateY(-50%); }

        /* 逐字歌词：卡拉 OK 从左到右填充。
           --p 是 0%-100% 的进度，用 linear-gradient 硬边分割"已唱/未唱"。
           只在 .current 行显示这个效果，其它行不做逐字动画。 */
        .lyric-char {
            display: inline-block;
            --p: 0%;
            color: inherit;
        }
        .lyric-line.current .lyric-char {
            background-image: linear-gradient(
                90deg,
                #e8c98f 0%, #e8c98f var(--p),
                rgba(255,255,255,0.22) var(--p), rgba(255,255,255,0.22) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            transition: none;
        }
        body.mono .lyric-line.current .lyric-char {
            background-image: linear-gradient(
                90deg,
                #4a3d8a 0%, #4a3d8a var(--p),
                rgba(0,0,0,0.18) var(--p), rgba(0,0,0,0.18) 100%
            );
        }

        .lyric-offset-wrap { display:flex; align-items:center; justify-content:center; gap:4px; }
        .lyric-offset-btn { width:20px; height:20px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.06); color:var(--text2); font-size:12px; display:flex; align-items:center; justify-content:center; line-height:1; cursor:pointer; padding:0; }
        .lyric-offset-btn:hover { background:rgba(255,255,255,0.15); color:var(--text); }
        .lyric-offset-val { font-size:10px; color:var(--text2); text-shadow:var(--ts2); min-width:24px; text-align:center; font-variant-numeric:tabular-nums; }

        /* ── GitHub（右栏，行11-17）── */
        .gh-wrap { grid-row:11/17; grid-column:9/17; display:flex; flex-direction:column; }
        .gh-grid { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .gh-months { display:flex; margin-bottom:0; }
        .gh-month { font-size:8px; color:var(--text2); text-shadow:var(--ts2); }
        .gh-body { display:flex; flex:1; min-width:0; overflow:hidden; }
        .gh-body-center { display:flex; flex:1; min-width:0; align-items:center; justify-content:center; }
        .gh-days { display:flex; flex-direction:column; gap:2px; width:20px; flex-shrink:0; }
        .gh-days span { font-size:7px; color:var(--text2); text-align:right; padding-right:2px; text-shadow:var(--ts2); }
        .gh-cells { display:flex; gap:2px; flex-shrink:0; }
        .gh-week { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
        .gh-cell { border-radius:2px; background:rgba(255,255,255,0.06); flex-shrink:0; }
        .gh-l1 { background:rgba(138,124,196,0.5); }
        .gh-l2 { background:rgba(138,124,196,0.7); }
        .gh-l3 { background:rgba(138,124,196,0.88); }
        .gh-l4 { background:#c2a8e0; }
        #ghTotal { color:var(--gold); font-weight:600; }

        .ld { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text2); font-size:12px; }
    </style>
</head>
<body>
<div class="grid">
    <!-- Header -->

<script>
var DASHBOARD_TOKEN = '';
try { DASHBOARD_TOKEN = localStorage.getItem('dashboardToken') || ''; } catch(e) {}
function secureFetch(url, options) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers['X-Requested-With'] = 'CuckooDashboard';
    if (DASHBOARD_TOKEN) options.headers['X-Dashboard-Token'] = DASHBOARD_TOKEN;
    return fetch(url, options);
}
function playerCtl(action) {
    secureFetch('/api/player/' + action, {method:'POST'}).catch(function(e){ console.error('[player]', e); });
}
function fmtTok(n) {
    if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
    if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
    if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
    if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
    return n.toLocaleString();
}
function fmtNum(n) { return n.toLocaleString(); }
function fmtBytes(b) {
    if (b >= 1073741824) return (b/1073741824).toFixed(1)+' GB';
    if (b >= 1048576) return (b/1048576).toFixed(1)+' MB';
    if (b >= 1024) return (b/1024).toFixed(1)+' KB';
    return b+' B';
}

/* ── 节假日数据库（2025-2026 中国法定节假日）── */
var _HOLIDAYS = {
    /* 2025 */
    '2025-01-01':'元旦','2025-01-28':'春节','2025-01-29':'春节','2025-01-30':'春节',
    '2025-01-31':'春节','2025-02-01':'春节','2025-02-02':'春节','2025-02-03':'春节',
    '2025-02-04':'春节',
    '2025-04-04':'清明节','2025-04-05':'清明节','2025-04-06':'清明节',
    '2025-05-01':'劳动节','2025-05-02':'劳动节','2025-05-03':'劳动节',
    '2025-05-04':'劳动节','2025-05-05':'劳动节',
    '2025-05-31':'端午节','2025-06-01':'端午节','2025-06-02':'端午节',
    '2025-10-01':'国庆节','2025-10-02':'国庆节','2025-10-03':'国庆节',
    '2025-10-04':'国庆节','2025-10-05':'国庆节','2025-10-06':'国庆节','2025-10-07':'国庆节',
    /* 2026 */
    '2026-01-01':'元旦','2026-01-02':'元旦','2026-01-03':'元旦',
    '2026-02-17':'春节','2026-02-18':'春节','2026-02-19':'春节',
    '2026-02-20':'春节','2026-02-21':'春节','2026-02-22':'春节','2026-02-23':'春节',
    '2026-04-05':'清明节','2026-04-06':'清明节','2026-04-07':'清明节',
    '2026-05-01':'劳动节','2026-05-02':'劳动节','2026-05-03':'劳动节',
    '2026-05-04':'劳动节','2026-05-05':'劳动节',
    '2026-06-19':'端午节','2026-06-20':'端午节','2026-06-21':'端午节',
    '2026-10-01':'国庆节','2026-10-02':'国庆节','2026-10-03':'国庆节',
    '2026-10-04':'国庆节','2026-10-05':'国庆节','2026-10-06':'国庆节','2026-10-07':'国庆节',
};
/* 调休上班日（周末但需要上班） */
var _WORKDAYS = {
    '2025-01-26':1,'2025-02-08':1,'2025-04-27':1,'2025-09-28':1,'2025-10-11':1,
    '2026-02-15':1,'2026-02-28':1,'2026-04-26':1,'2026-10-10':1,
};
var WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

function getDayType(d) {
    var y = d.getFullYear(), m = d.getMonth()+1, dd = d.getDate();
    var key = y+'-'+String(m).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var dow = d.getDay();
    if (_HOLIDAYS[key]) return {type:'holiday', label:_HOLIDAYS[key]};
    if (_WORKDAYS[key]) return {type:'workday', label:WEEKDAYS[dow]};
    if (dow===0||dow===6) return {type:'weekend', label:WEEKDAYS[dow]};
    return {type:'workday', label:WEEKDAYS[dow]};
}

function tickClock() {
    var d = new Date();
    /* 12小时制时钟 */
    var h = d.getHours();
    var ampm = h < 12 ? 'AM' : 'PM';
    var h12 = h % 12; if (h12 === 0) h12 = 12;
    var hh = String(h12).padStart(2,'0');
    var mm = String(d.getMinutes()).padStart(2,'0');
    var ss = String(d.getSeconds()).padStart(2,'0');
    document.getElementById('hdrClock').textContent = hh+':'+mm+':'+ss;
    document.getElementById('hdrAmpm').textContent = ampm;

    /* 日期 + 星期 */
    var dayInfo = getDayType(d);
    var weekday = WEEKDAYS[d.getDay()];
    var dateStr = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+weekday;
    if (dayInfo.type === 'holiday') {
        dateStr += ' · '+dayInfo.label;
    }
    document.getElementById('hdrDate').textContent = dateStr;

    /* 闲时标签（北京时间 0:00-8:00） */
    var bjH = (d.getUTCHours()+8)%24;
    var rateEl = document.getElementById('hdrRate');
    if (bjH>=0 && bjH<8) {
        rateEl.textContent = '0.8x';
        rateEl.style.display = 'inline';
    } else {
        rateEl.textContent = '1.0x';
        rateEl.style.display = 'inline';
    }
}

/* ── 今日消耗堆叠条 ── */
function drawTodayStacked(inMiss, outTok, cacheTok) {
    var total = inMiss + outTok + cacheTok;
    if (total <= 0) return;
    document.getElementById('segCache').style.width = (cacheTok/total*100)+'%';
    document.getElementById('segIn').style.width = (inMiss/total*100)+'%';
    document.getElementById('segOut').style.width = (outTok/total*100)+'%';
    document.getElementById('todayCachePct').textContent = (cacheTok/total*100).toFixed(1)+'%';
    document.getElementById('todayInPct').textContent = (inMiss/total*100).toFixed(1)+'%';
    document.getElementById('todayOutPct').textContent = (outTok/total*100).toFixed(1)+'%';
}

/* ── Token Plan 环形图 ── */
function drawRing(pct, used, limit) {
    var C = 2*Math.PI*35;
    var remain = 100 - pct;
    var remainAmt = Math.max(0, limit - used);
    var fg = document.getElementById('ringFg');
    fg.style.strokeDashoffset = C*(1-remain/100);
    fg.style.stroke = pct>=90?'#cf5b68':pct>=70?'#d1a15c':'#e8c98f';
    document.getElementById('ringPct').textContent = remain.toFixed(1)+'%';
    document.getElementById('ringLabel').textContent = fmtTok(remainAmt)+' 剩余';
}

function drawModels(data) {
    var el = document.getElementById('modelBars');
    if (!data||!data.length) { el.innerHTML='<div class="ld">暂无数据</div>'; return; }
    data.sort(function(a,b){return b.totalToken-a.totalToken});
    var mx = data[0].totalToken;
    var fills = ['f1','f2','f3'];
    el.innerHTML = data.map(function(d,i){
        var w = mx>0?(d.totalToken/mx*100):0;
        return '<div class="bar-row">'+
            '<span class="bar-name">'+d.model+'</span>'+
            '<div class="bar-track"><div class="bar-fill '+fills[i%fills.length]+'" style="width:'+w+'%"></div></div>'+
            '<div class="bar-info"><div class="v">'+fmtTok(d.totalToken)+'</div><div class="s">'+fmtNum(d.requestCount)+' 次</div></div>'+
        '</div>';
    }).join('');
}

/* ── 系统信息（CPU / 内存 / 独显，纵向三列）── */
function drawSystem(sys) {
    if (!sys) return;
    var R = 30, C = 2 * Math.PI * R;

    function ringColor(pct) { return pct >= 90 ? '#cf5b68' : pct >= 80 ? '#d1a15c' : '#5fa89e'; }
    function mainRing(pct, name, sub, color) {
        // 半开口仪表盘：270度弧（底部留90度缺口），从左下(135deg)顺时针到右下
        var SVG = 84, cx = SVG/2, cy = SVG/2, RV = 34;
        var C = 2 * Math.PI * RV;
        var arcLen = C * 0.75;
        var gapLen = C - arcLen;
        var filled = (pct / 100) * arcLen;
        var clr = color || ringColor(pct);
        return '<div class="hw-main-item">' +
            '<div class="hw-main-ring" style="width:'+SVG+'px;height:'+SVG+'px;">' +
            '<svg width="'+SVG+'" height="'+SVG+'" viewBox="0 0 '+SVG+' '+SVG+'">' +
            '<circle class="hw-ring-bg" cx="'+cx+'" cy="'+cy+'" r="'+RV+'" stroke-dasharray="'+arcLen+' '+gapLen+'" transform="rotate(135 '+cx+' '+cy+')"/>' +
            '<circle class="hw-ring-fg" cx="'+cx+'" cy="'+cy+'" r="'+RV+'" stroke="'+clr+'" stroke-dasharray="'+filled+' '+(C-filled)+'" transform="rotate(135 '+cx+' '+cy+')"/>' +
            '</svg>' +
            '<div class="hw-main-center"><span class="hw-main-pct">'+pct.toFixed(0)+'%</span><span class="hw-main-sub">'+sub+'</span></div>' +
            '</div>' +
            '<span class="hw-main-name" title="'+name+'">'+name+'</span></div>';
    }

    var c = sys.cpu, m = sys.memory;
    var cpuName = (c.model||'').replace(/AMD\s+Ryzen\s+/i,'R').replace(/\(R\)/g,'').replace(/\(TM\)/g,'').replace(/CPU\s*/i,'').replace(/@\s*[\d.]+GHz/i,'').replace(/\d+\s*-?\s*Core\s*Processor/gi,'').trim();
    var freqGHz = c.freq_current >= 1000 ? (c.freq_current / 1000).toFixed(2) : c.freq_current;
    var cpuSub = freqGHz + 'GHz';

    var memLabel = (m.type || '内存') + (m.freq ? ' ' + m.freq : '');
    var memTotalGB = m.installed ? (m.installed / 1073741824) : (m.total / 1073741824);
    var memSub = (m.used / 1073741824).toFixed(1) + '/' + memTotalGB.toFixed(1) + 'G';

    var html = '<div class="hw-main">';
    html += mainRing(c.percent, cpuName, cpuSub);
    html += mainRing(m.percent, memLabel, memSub);
    // 只显示独立显卡，过滤掉核显
    var discreteGpus = (sys.gpus || []).filter(function(g){ return g.is_discrete; });
    if (discreteGpus.length) {
        var g = discreteGpus[0];
        var sn = g.name.replace(/AMD\s+/,'').replace(/Radeon\s+/g,'').replace(/\(TM\)/g,'').replace(/NVIDIA\s+/gi,'');
        var totalVramGB = g.vram > 0 ? (g.vram / 1073741824).toFixed(0) : '';
        var usedVramGB = g.vram_used != null && g.vram_used > 0 ? (g.vram_used / 1073741824).toFixed(1) : '';
        var vs = usedVramGB && totalVramGB ? usedVramGB + '/' + totalVramGB + 'G' : (totalVramGB ? totalVramGB + 'G' : '');
        var u = g.util!=null ? g.util : 0;
        html += mainRing(u, sn, vs);
    }
    html += '</div>';
    document.getElementById('sysMain').innerHTML = html;

    drawDisks(sys.disks || []);
    drawNetwork(sys.network);

    // 开机时间
    var upEl = document.getElementById('uptimeVal');
    if (upEl && sys.system && sys.system.uptime != null) {
        var s = sys.system.uptime;
        var d = Math.floor(s / 86400); s %= 86400;
        var h = Math.floor(s / 3600); s %= 3600;
        var m = Math.floor(s / 60);
        upEl.textContent = (d > 0 ? d+'天' : '') + h+'时'+m+'分';
    }
}

/* ── 磁盘（独立卡片，两列布局）── */
function drawDisks(disksRaw) {
    var el = document.getElementById('sysDisks');
    if (!el) return;
    var disks = disksRaw.slice().sort(function(a,b){
        var order = {'SSD':0, 'NVMe':0, 'HDD':1};
        return (order[a.type]||2) - (order[b.type]||2);
    });
    var dh = '';
    for (var j = 0; j < disks.length; j++) {
            var dk = disks[j];
            var raw = (dk.model||'').replace(/\s*\([A-Z]+\)\s*$/,'').trim();
            var dn = raw
                .replace(/KINGSTON\s+SNV2S/gi,'K SNV2')
                .replace(/KINGSTON\s+SNVS/gi,'K SNVS')
                .replace(/KINGSTON\s+/gi,'K ')
                .replace(/Samsung\s+/gi,'S ')
                .replace(/Western\s*Digital\s+/gi,'W ')
                .replace(/WDC\s+/gi,'W ')
                .replace(/Phison\s+/gi,'P ')
                .replace(/ESR512GDLCG-E3C-4/gi,'512G NVMe')
                .replace(/WD30EZRX-00D8PB0/gi,'3T HDD');
            if (dn.length > 12) dn = dn.substring(0,10)+'..';
            var typeTag = (dk.type === 'SSD' || dk.type === 'HDD') ? ' ['+dk.type+']' : '';

            if (dk.total <= 0) {
                dh += '<div class="dk-disk-group"><div class="dk-disk-hd"><span class="dk-disk-name">'+dn+'</span><span class="dk-disk-info" style="color:var(--text2)">未分配</span></div></div>';
                continue;
            }
            var usedGB = (dk.used/1073741824).toFixed(0);
            var totalGB = (dk.total/1073741824).toFixed(0);
            var group = '<div class="dk-disk-group"><div class="dk-disk-hd"><span class="dk-disk-name" title="'+(dk.model||'')+typeTag+'">'+dn+'</span><span class="dk-disk-info">'+usedGB+'/'+totalGB+'G '+dk.percent+'%</span></div>';
            var parts = dk.partitions || [];
            if (parts.length > 0) {
                for (var p = 0; p < parts.length; p++) {
                    var pt = parts[p];
                    var fc = pt.percent>=90?'danger':pt.percent>=70?'warn':'ok';
                    group += '<div class="dk-part-row"><span class="dk-part-letter">'+pt.letter+'</span>' +
                        '<div class="dk-part-track"><div class="dk-part-fill '+fc+'" style="width:'+pt.percent+'%"></div></div></div>';
                }
            } else {
                var fc = dk.percent>=90?'danger':dk.percent>=70?'warn':'ok';
                group += '<div class="dk-part-row"><span class="dk-part-letter"></span>' +
                    '<div class="dk-part-track"><div class="dk-part-fill '+fc+'" style="width:'+dk.percent+'%"></div></div></div>';
            }
            group += '</div>';
            dh += group;
    }
    el.innerHTML = dh;
}

/* ── 网络状态（仅上下行速度）── */
function drawNetwork(net) {
    if (!net) return;
    var upEl = document.getElementById('netUp');
    var downEl = document.getElementById('netDown');
    if (upEl) upEl.innerHTML = fmtBytes(net.rate_up) + '<span class="net-unit">/s</span>';

function drawGitHub(contrib, username) {
    var el = document.getElementById('ghGrid');
    if (!contrib||typeof contrib!=='object'||Object.keys(contrib).length===0) {
        el.innerHTML='<div class="ld">暂无数据</div>';
        document.getElementById('ghUser').textContent='@'+username;
        document.getElementById('ghTotal').textContent='0 次贡献';
        return;
    }
    var today=new Date(); today.setHours(0,0,0,0);
    var dow=today.getDay(), nw=26;
    var sd=new Date(today); sd.setDate(sd.getDate()-dow-(nw-1)*7);

    var gap = 2;
    var cw = el.clientWidth || 450;
    var ch = el.clientHeight || 140;
    var dayLabelW = 20, padX = 4;
    var monthLabelH = 10, padY = 2;
    var csW = Math.floor((cw - dayLabelW - padX - (nw-1)*gap) / nw);
    var csH = Math.floor((ch - monthLabelH - padY - 6*gap) / 7);
    var cs = Math.max(4, Math.min(csW, csH));

    var weeks=[],total=0,ml={};
    var mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    for (var w=0;w<nw;w++){
        var cells=[];
        for (var d=0;d<7;d++){
            var dt=new Date(sd); dt.setDate(dt.getDate()+w*7+d);
            if(dt>today){cells.push('<div class="gh-cell" style="width:'+cs+'px;height:'+cs+'px;opacity:0.08"></div>');continue;}
            var key=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
            var val=contrib[key]||0; total+=val;
            var lv=''; if(val>0) lv=val<=2?'gh-l1':val<=5?'gh-l2':val<=10?'gh-l3':'gh-l4';
            cells.push('<div class="gh-cell '+lv+'" title="'+key+': '+val+'" style="width:'+cs+'px;height:'+cs+'px"></div>');
            if(d===1){var m=dt.getMonth();var pw=new Date(sd);pw.setDate(pw.getDate()+(w-1)*7+1);if(w===0||pw.getMonth()!==m)ml[w]=mn[m];}
        }
        weeks.push('<div class="gh-week" style="width:'+cs+'px;gap:'+gap+'px;">'+cells.join('')+'</div>');
    }
    // 月份标签
    var cellsW = nw * (cs + gap) - gap;
    var mr='<div class="gh-months" style="display:flex;width:'+(cellsW+dayLabelW+2)+'px;margin:0 auto;">';
    mr+='<span style="flex:none;width:'+(dayLabelW+2)+'px;"></span>';
    for(var w=0;w<nw;w++) mr+='<span class="gh-month" style="flex:none;width:'+(cs+gap)+'px">'+(ml[w]||'')+'</span>';
    mr+='</div>';
    // 日期标签
    var daysArr=['Sun','Mon','','Wed','','Fri',''];
    var dayLabels='<div class="gh-days" style="height:'+(7*cs+6*gap)+'px;">';
    for(var d=0;d<7;d++) dayLabels+='<span style="height:'+cs+'px;line-height:'+cs+'px;">'+daysArr[d]+'</span>';
    dayLabels+='</div>';
    el.innerHTML='<div class="gh-body"><div style="margin:auto;">'+mr+'<div style="display:flex;">'+dayLabels+'<div class="gh-cells">'+weeks.join('')+'</div></div></div></div>';
    document.getElementById('ghUser').textContent='@'+username;
    document.getElementById('ghTotal').textContent=fmtNum(total)+' 次贡献';
}

/* MiMo 数据处理（WS 推送和 REST 调用共用） */
function handleMimoData(d) {
    if (!d.success) { console.error('API Error:',d.error); }

    // 今日消耗
    var daily = d.daily_detail;
    var inTok=0, outTok=0, totalTok=0, cacheTok=0;
    if (daily && daily.tokenUsage) {
        var now=new Date();
        var bjH=(now.getUTCHours()+8)%24;
        var ref=bjH<8?new Date(now.getTime()-86400000):now;
        var key=String(ref.getUTCMonth()+1).padStart(2,'0')+'-'+String(ref.getUTCDate()).padStart(2,'0');
        var te=null;
        for(var i=0;i<daily.tokenUsage.length;i++){if(daily.tokenUsage[i][0]===key){te=daily.tokenUsage[i];break;}}
        if(te){
            inTok=te[1]||0; outTok=te[2]||0; totalTok=te[3]||0; cacheTok=te[4]||0;
        }
    }
    var lu = d.local_usage;
    if (lu && lu.requestCount > 0) {
        cacheTok += lu.totalCacheReadTokens || 0;
        inTok += lu.totalInputTokens || 0;
        outTok += lu.totalOutputTokens || 0;
        totalTok += lu.totalTokens || 0;
    }
    if (inTok > 0 || outTok > 0 || totalTok > 0) {
        var inMiss=d.mimo_inMiss+(lu?lu.totalInputTokens:0);
        document.getElementById('todayTotal').textContent=fmtTok(totalTok);
        document.getElementById('todayCache').textContent=fmtTok(cacheTok);
        document.getElementById('todayCachePct').textContent=totalTok>0?(cacheTok/totalTok*100).toFixed(1)+'%':'0%';
        document.getElementById('todayIn').textContent=fmtTok(inMiss);
        document.getElementById('todayInPct').textContent=totalTok>0?(inMiss/totalTok*100).toFixed(1)+'%':'0%';
        document.getElementById('todayOut').textContent=fmtTok(outTok);
        document.getElementById('todayOutPct').textContent=totalTok>0?(outTok/totalTok*100).toFixed(1)+'%':'0%';
        drawTodayStacked(inMiss,outTok,cacheTok);
    }

    // Token Plan
    var expiredEl = document.getElementById('mimoExpired');
    if(d.mimo_expired){
        if(expiredEl) expiredEl.style.display='flex';
    } else {
        if(expiredEl) expiredEl.style.display='none';
        var usage=d.usage;
        if(usage&&usage.monthUsage){
            var mu=usage.monthUsage;
            drawRing(mu.percent*100,mu.items[0]?mu.items[0].used:0,mu.items[0]?mu.items[0].limit:0);
        }
        drawModels(d.tp_usage_detail||[]);
    }

    // 余额
    if(d.balance) document.getElementById('sBal').textContent='\u00A5'+(d.balance.balance||'0.00');

    // GitHub
    if(d.github) drawGitHub(d.github.contributions||{},d.github.user||'');
}

/* ── 歌词 ── */
var _mediaLyrics = [];       // 逐行 lrc: [[sec, text], ...]
var _mediaLyricsYrc = [];    // 逐字 yrc: [{start:ms, chars:[{start,dur,text}]}, ...]
var _mediaHasYrc = false;    // 当前是否走 yrc 渲染路径
var _mediaTitle = '';
var _mediaStartTime = 0;
var _mediaPosition = 0;
var _mediaDuration = 0;
var _mediaPlaying = false;
var _lastLyricIdx = -2;
var _lastPositionSource = 'none';
var LYRIC_OFFSET = 1.5;  // 默认值，启动时从后端加载
secureFetch('/api/media/offset').then(r=>r.json()).then(d=>{
    LYRIC_OFFSET = d.offset;
    document.getElementById('lyricOffsetVal').textContent = LYRIC_OFFSET.toFixed(1);
}).catch(function(){ try { var v=parseFloat(localStorage.getItem('lyricOffset')); if(!isNaN(v)){LYRIC_OFFSET=v; document.getElementById('lyricOffsetVal').textContent=LYRIC_OFFSET.toFixed(1);} } catch(e){} });

function adjOffset(delta) {
    secureFetch('/api/media/offset', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({delta: delta})
    }).then(r=>r.json()).then(d=>{
        LYRIC_OFFSET = d.offset;
        document.getElementById('lyricOffsetVal').textContent = LYRIC_OFFSET.toFixed(1);
    });
}

var LYRIC_LINE_H = 30;       // 每行固定高度(px)，需与CSS .lyric-line的height一致
var _pendingIdx = -2;        // 待确认的候选索引（用于防抖，过滤UIA测量抖动）
var _pendingSince = 0;       // 候选索引首次出现的时刻（ms）
var LYRIC_DEBOUNCE_MS = 300; // 候选索引需要稳定多少毫秒才真正切换
                             // 阈值太小 → UIA 抖动会在句子边界反复切；
                             // 阈值太大 → 切换有肉眼可见的延迟。300ms 是折中。

function drawLyric(data) {
    var titleEl = document.getElementById('lyricTitle');
    var artistEl = document.getElementById('lyricArtist');
    var scrollEl = document.getElementById('lyricScroll');
    var idleEl = document.getElementById('lyricIdle');

    if (!data || data.status === 'idle' || data.status === 'error' || !data.title) {
        titleEl.textContent = '--';
        artistEl.textContent = '';
        scrollEl.innerHTML = '';
        idleEl.textContent = '未在播放';
        idleEl.style.display = 'block';
        _mediaPlaying = false;
        _mediaTitle = '';
        return;
    }

    titleEl.textContent = data.title;
    artistEl.textContent = data.artist;
    _mediaPlaying = (data.status === 'playing');

    var isNewSong = (data.title !== _mediaTitle);
    if (isNewSong) {
        _mediaTitle = data.title;
        _mediaLyrics = data.lyrics || [];
        _mediaLyricsYrc = data.lyrics_yrc || [];
        _mediaHasYrc = _mediaLyricsYrc.length > 0;
        _mediaDuration = data.duration || 0;
        _mediaPosition = data.position || 0;
        _mediaStartTime = Date.now() / 1000 - _mediaPosition;
        _lastLyricIdx = -2;
        _pendingIdx = -2;
        _pendingSince = 0;
        _lastPositionSource = data.position_source || 'none';
        var hasAny = _mediaHasYrc || _mediaLyrics.length > 0;
        idleEl.style.display = hasAny ? 'none' : 'block';
        idleEl.textContent = '暂无歌词';
        renderLyricLines();
    } else if (data.position_source === 'api') {
        // YesPlayMusic API 直接返回精确 position，无抖动，每次都校准
        var newPos = data.position || 0;
        var looped = (_lastPositionSource === 'api' && newPos < _mediaPosition - 5);
        _mediaPosition = newPos;
        if (data.duration) _mediaDuration = data.duration;
        _lastPositionSource = 'api';
        if (looped) {
            resetLyricState();
        }
        _mediaStartTime = Date.now() / 1000 - _mediaPosition;
    } else if (data.position_source === 'uia') {
        // UIA 读进度条有像素级抖动（1px ≈ 0.2 秒），漂移 > 0.3 秒就修正
        var newPos = data.position || 0;
        var looped = (_lastPositionSource === 'uia' && newPos < _mediaPosition - 5);
        var estPos = _mediaPlaying ? (Date.now() / 1000 - _mediaStartTime) : _mediaPosition;
        var drift = newPos - estPos;
        _mediaPosition = newPos;
        _lastPositionSource = 'uia';
        if (looped) {
            _mediaStartTime = Date.now() / 1000 - _mediaPosition;
            resetLyricState();
            updateLyricLine(true);
            return;
        }
        if (_lastPositionSource !== 'uia' || Math.abs(drift) > 0.3) {
            _mediaStartTime = Date.now() / 1000 - _mediaPosition;
        }
    } else if (_lastPositionSource !== 'uia') {
        // UIA 不可用（网易云窗口最小化等），退化为本地估算计时。
        // 若估算出的位置超过总时长，视为可能已循环重播，从0开始重新估算。
        var estPos = _mediaPlaying ? (Date.now() / 1000 - _mediaStartTime) : _mediaPosition;
        if (_mediaDuration > 0 && estPos >= _mediaDuration) {
            _mediaStartTime = Date.now() / 1000;
            _mediaPosition = 0;
            resetLyricState();
            updateLyricLine(true);
            return;
        }
    }

    updateLyricLine();
}

function resetLyricState() {
    _lastLyricIdx = -2;
    _pendingIdx = -2;
    _pendingSince = 0;
}

/* 一次性渲染全部歌词行到滚动容器（只在歌曲切换时调用一次）。
   有 yrc 时按字符渲染；否则按整行渲染（旧行为）。 */
function renderLyricLines() {
    var scrollEl = document.getElementById('lyricScroll');
    if (!scrollEl) return;

    if (_mediaHasYrc) {
        var html = _mediaLyricsYrc.map(function(line){
            var chars = line.chars.map(function(c){
                var text = (c.text === ' ' ? '&nbsp;' : (c.text || '&nbsp;'));
                return '<span class="lyric-char">'+text+'</span>';
            }).join('');
            return '<div class="lyric-line">'+chars+'</div>';
        }).join('');
        scrollEl.innerHTML = html;
    } else {
        var html2 = _mediaLyrics.map(function(item){
            return '<div class="lyric-line">'+(item[1] || '&nbsp;')+'</div>';
        }).join('');
        scrollEl.innerHTML = html2;
    }
}

/* 将指定索引的歌词行滚动到容器中央，并更新高亮样式 */
function scrollToLyricIdx(idx) {
    var scrollEl = document.getElementById('lyricScroll');
    var textEl = document.getElementById('lyricText');
    if (!scrollEl || !textEl) return;

    var containerH = textEl.clientHeight || 0;
    var offset = containerH / 2 - LYRIC_LINE_H / 2 - idx * LYRIC_LINE_H;
    scrollEl.style.transform = 'translateY(' + offset + 'px)';

    var lines = scrollEl.children;
    for (var i = 0; i < lines.length; i++) {
        var off = i - idx;
        lines[i].className = 'lyric-line' +
            (off === 0 ? ' current' : (Math.abs(off) === 1 ? ' near' : ''));
    }
}

/* 更新逐字高亮：对当前行的每个字符按时间进度控制 CSS 变量。
   已过 = 完全高亮；正在唱 = 从 0% 渐变到某比例；未到 = 暗色。 */
function updateYrcHighlight(idx, posMs) {
    if (!_mediaHasYrc || idx < 0 || idx >= _mediaLyricsYrc.length) return;
    var scrollEl = document.getElementById('lyricScroll');
    if (!scrollEl) return;
    var lineEl = scrollEl.children[idx];
    if (!lineEl) return;
    var chars = _mediaLyricsYrc[idx].chars;
    var spans = lineEl.children;
    for (var i = 0; i < chars.length && i < spans.length; i++) {
        var c = chars[i];
        var endMs = c.start + c.dur;
        var span = spans[i];
        if (posMs >= endMs) {
            if (span.dataset.state !== 'done') {
                span.dataset.state = 'done';
                span.style.setProperty('--p', '100%');
            }
        } else if (posMs >= c.start) {
            var p = (posMs - c.start) / c.dur;
            if (p < 0) p = 0; else if (p > 1) p = 1;
            span.dataset.state = 'active';
            span.style.setProperty('--p', (p * 100).toFixed(1) + '%');
        } else {
            if (span.dataset.state !== 'idle') {
                span.dataset.state = 'idle';
                span.style.setProperty('--p', '0%');
            }
        }
    }
}

function updateLyricLine(force) {
    var lyricsForLine = _mediaHasYrc ? _mediaLyricsYrc : _mediaLyrics;
    if (!lyricsForLine.length) return;

    var posSec = (_mediaPlaying ? (Date.now() / 1000 - _mediaStartTime) : _mediaPosition) + LYRIC_OFFSET;
    var posMs = posSec * 1000;

    // 找当前行索引
    var idx = -1;
    if (_mediaHasYrc) {
        for (var i = 0; i < _mediaLyricsYrc.length; i++) {
            if (_mediaLyricsYrc[i].start <= posMs) idx = i;
            else break;
        }
    } else {
        for (var i2 = 0; i2 < _mediaLyrics.length; i2++) {
            if (_mediaLyrics[i2][0] <= posSec) idx = i2;
            else break;
        }
    }

    // 行切换逻辑（按"稳定 N 毫秒"防抖，跟定时器频率解耦）
    var lineChanged = (idx !== _lastLyricIdx);
    if (lineChanged) {
        var nowMs = Date.now();
        if (idx !== _pendingIdx) {
            _pendingIdx = idx;
            _pendingSince = nowMs;
        }
        var settled = (nowMs - _pendingSince) >= LYRIC_DEBOUNCE_MS;
        // 大跳（idx 差 > 1，比如切歌或 seek）立即生效，不做防抖；
        // 相邻行切换（正常推进）才走时间稳定检查
        var bigJump = Math.abs(idx - _lastLyricIdx) > 1;
        if (settled || force || bigJump) {
            _lastLyricIdx = idx;
            scrollToLyricIdx(idx);
        }
    } else if (force) {
        scrollToLyricIdx(_lastLyricIdx);
    }

    // yrc 每次都要刷字符高亮（不受防抖影响，保证平滑）
    if (_mediaHasYrc) updateYrcHighlight(_lastLyricIdx, posMs);
}

async function refreshMedia() {
    try {
        var r = await secureFetch('/api/media');
        var d = await r.json();
        drawLyric(d);
    } catch(e) { console.error('Media error:', e); }

}
// 逐字歌词需要平滑更新，60ms ≈ 16fps；lrc-only 时也没多花什么开销
setInterval(updateLyricLine, 60);
window.addEventListener('resize', function(){ updateLyricLine(true); });

/* ── NUG 平台数据 ── */
async function refreshNug() {
    try {
        var r = await secureFetch('/api/nug');
        var d = await r.json();
        if (!d.enabled) return;
        if (d.error) { console.error('NUG error:', d.error); return; }
        document.getElementById('nugBal').textContent = '$' + (d.balance || 0).toFixed(2);
    } catch(e) { console.error('NUG refresh error:', e); }
}

tickClock(); setInterval(tickClock,1000);

// 初始化歌词偏移量显示
document.getElementById('lyricOffsetVal').textContent = LYRIC_OFFSET.toFixed(1);

/* ── WebSocket 统一数据推送 ── */
var _ws = null, _wsRetry = 1000, _wsFallbackTimer = null;

function connectWS(){
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    _ws = new WebSocket(proto + '//' + location.host + '/ws');
    _ws.onopen = function(){
        _wsRetry = 1000;
        if(_wsFallbackTimer){clearInterval(_wsFallbackTimer); _wsFallbackTimer=null;}
        sendVibeState(); // 同步 Vibe Coding 状态到后端
        console.log('[ws] connected');
    };
    _ws.onmessage = function(ev){
        try {
            var msg = JSON.parse(ev.data);
            if(msg.type === 'system') drawSystem(msg.data);
            else if(msg.type === 'media') drawLyric(msg.data);
            else if(msg.type === 'mimo'){ handleMimoData(msg.data); }
            else if(msg.type === 'nug'){ if(msg.data.enabled && msg.data.balance!=null) document.getElementById('nugBal').textContent='$'+msg.data.balance.toFixed(2); }
            else if(msg.type === 'theme'){ applyTheme(msg.data); }
        } catch(e){ console.error('[ws] parse error:', e); }
    };
    _ws.onclose = function(){
        console.log('[ws] disconnected, retry in ' + (_wsRetry/1000) + 's');
        setTimeout(connectWS, _wsRetry);
        _wsRetry = Math.min(_wsRetry * 2, 30000);
        // 重连期间回退 REST 轮询
        if(!_wsFallbackTimer){
            refreshSys(); refreshMedia();
            _wsFallbackTimer = setInterval(function(){ refreshSys(); refreshMedia(); }, 2000);
        }
    };
}
connectWS();

/* ── Vibe Coding 状态切换（仅 UI 标记，数据由 WS 统一推送）── */
var _vibeActive = false;

function applyVibeUI() {
    var toggle = document.getElementById('vibeToggle');
    var label = document.getElementById('vibeToggleLabel');
    if (!toggle || !label) return;
    if (_vibeActive) {
        toggle.classList.add('active');
        label.textContent = 'Coding';
    } else {
        toggle.classList.remove('active');
        label.textContent = 'Chilling';
    }
}

function sendVibeState() {
    if (_ws && _ws.readyState === 1) {
        _ws.send(JSON.stringify({type: 'vibe', active: _vibeActive}));
    }
}

function toggleVibe() {
    _vibeActive = !_vibeActive;
    try { localStorage.setItem('vibeActive', _vibeActive ? '1' : '0'); } catch(e) {}
    applyVibeUI();
    sendVibeState();
    refresh(); // 切换时立即请求一次 mimo 数据
}

(function initVibe(){
    try { _vibeActive = localStorage.getItem('vibeActive') === '1'; } catch(e) { _vibeActive = false; }
    applyVibeUI();
})();

// 首次立即拉取 mimo 数据（WS 启动后每 60s 自动推送）
refresh();

/* ── 主题切换（点击左上角红圈，通过后端 API 循环切换）── */
function applyTheme(d){
    var name = d.theme || 'dark', bg = d.bg || {};
    document.body.dataset.theme = name;
    document.body.classList.toggle('mono', name === 'mono');
    // 背景：强绑定主题
    if(bg.bg_type === 'image' && bg.bg_image){
        document.body.style.background = "url('"+bg.bg_image+"') center/cover no-repeat fixed";
        document.body.style.backgroundColor = bg.bg_color || '#000';
    } else {
        document.body.style.background = bg.bg_color || '#0a0618';
    }
    try { localStorage.setItem('themeData', JSON.stringify(d)); } catch(e){}
}
// 启动时从后端读取当前主题
secureFetch('/api/theme').then(r=>r.json()).then(applyTheme).catch(()=>{
    // 后端不可用时回退到 localStorage 缓存
    try { var c=JSON.parse(localStorage.getItem('themeData')); if(c) applyTheme(c); } catch(e){}
});
// 点击红圈 → 后端切换下一个主题
document.querySelector('.mark').addEventListener('click', function(){
    secureFetch('/api/theme/next',{method:'POST'}).then(r=>r.json()).then(applyTheme);
});
</script>
