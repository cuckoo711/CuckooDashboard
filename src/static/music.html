<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Music Stage</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/music.css">
</head>
<body class="cinema">
<canvas id="fxCanvas" aria-hidden="true"></canvas>
<div class="cover-bg" id="coverBg" aria-hidden="true"></div>
<div class="galaxy" id="galaxy" aria-hidden="true"></div>
<div class="glow" id="glow" aria-hidden="true"></div>
<div class="beam" id="beam" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
<div class="film-grain" aria-hidden="true"></div>

<div class="stage">
    <header class="topbar">
        <a class="back" href="/" title="返回看板">← Dashboard</a>
        <div class="top-meta">
            <span class="badge" id="connBadge">连接中</span>
            <span class="badge soft" id="specBadge">频谱待机</span>
            <span class="badge soft" id="orbitBadge" title="拖动舞台或方向键旋转">3D 0° / 14°</span>
        </div>
    </header>

    <div class="track-stage" aria-live="polite">
        <div class="title" id="trackTitle">--</div>
        <div class="artist" id="trackArtist">等待媒体会话…</div>
    </div>

    <div class="scene-viewport" id="sceneViewport" title="拖动旋转 · 方向键调整 · 双击复位">
        <div class="scene" id="scene3d">
            <div class="stage-floor" id="stageFloor"></div>
            <main class="center cinema-center">
                <div class="layer layer-visual">
                    <div class="visual-core">
                        <div class="orbital-mark orbital-mark-a" aria-hidden="true"></div>
                        <div class="orbital-mark orbital-mark-b" aria-hidden="true"></div>
                        <canvas id="ringCanvas" width="480" height="480" aria-hidden="true"></canvas>
                        <div class="cover-disc" id="coverDisc" hidden>
                            <img id="coverImg" alt="当前专辑封面">
                        </div>
                        <div class="core-flare" id="coreFlare" aria-hidden="true"></div>
                    </div>
                </div>

                <div class="layer layer-lyric">
                    <div class="lyric-stage cinema-lyric">
                        <div class="lyric-kicker" aria-hidden="true"><span>LYRIC / LIVE</span><i></i></div>
                        <div class="lyric-prev" id="lyricPrev" hidden></div>
                        <div class="lyric-track" id="lyricTrack">
                            <div class="lyric-current lyric-slot lyric-slot-a" id="lyricCurrent">未在播放</div>
                            <div class="lyric-next lyric-slot lyric-slot-b" id="lyricNext"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Spectrum is intentionally outside #scene3d so 3D orbit never tilts it. -->
    <div class="layer layer-spectrum" id="spectrumLayer" aria-hidden="true">
        <div class="spectrum-wrap soft aurora">
            <div class="spectrum-caption" aria-hidden="true"><span>SOUND FIELD</span><i></i></div>
            <canvas id="specCanvas" height="220" aria-hidden="true"></canvas>
        </div>
    </div>

    <footer class="bottom minimal cinema-footer" aria-hidden="true">
        <div class="progress-row">
            <span id="posText">0:00</span>
            <div class="progress-bar"><i id="progressFill"></i></div>
            <span id="durText">0:00</span>
        </div>
    </footer>
</div>

<div class="corner-menu" id="cornerMenu">
    <button class="menu-dots" id="menuDots" type="button" title="更多">⋯</button>
    <div class="menu-panel" id="menuPanel" hidden>
        <div class="menu-section">
            <div class="menu-label">歌词偏移</div>
            <div class="menu-row">
                <button type="button" onclick="adjLyric(-0.5)">−</button>
                <span id="lyricOffsetVal">0.0s</span>
                <button type="button" onclick="adjLyric(0.5)">+</button>
            </div>
        </div>
        <div class="menu-section">
            <div class="menu-label">频谱偏移</div>
            <div class="menu-row">
                <button type="button" onclick="adjSpectrum(-10)">−</button>
                <span id="spectrumOffsetVal">+40ms</span>
                <button type="button" onclick="adjSpectrum(10)">+</button>
            </div>
        </div>
        <div class="menu-section">
            <div class="menu-label">鼓点提前</div>
            <div class="menu-row">
                <button type="button" onclick="adjBeat(-10)">−</button>
                <span id="beatLeadVal">+20ms</span>
                <button type="button" onclick="adjBeat(10)">+</button>
            </div>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-section">
            <div class="menu-label">电影视角</div>
            <div class="menu-hint" id="orbitHint">左右 0° · 俯仰 14°</div>
            <div class="menu-hint">最大 ±45° / ±30° · R 复位</div>
            <button type="button" class="menu-action" id="orbitResetBtn">复位视角</button>
        </div>
        <div class="menu-divider"></div>
        <a class="menu-link" href="/settings">打开配置后台</a>
    </div>
</div>

<script src="/static/music.js"></script>
</body>
</html>
