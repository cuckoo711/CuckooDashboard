<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuckoo Dashboard</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/dashboard.css?v=dashboard-lrc-1">

</head>
<body>
<!-- 断连条幅：默认隐藏，进入离线态时由 dashboard.js 自动滑下显示 -->
<div class="net-banner" id="netBanner" role="status" aria-live="polite">⚠ 网络已断开，正在重连…</div>
<div class="grid">
    <!-- Header -->
    <div class="hdr">
        <div class="hdr-l">
            <div class="mark" data-action="cycle-theme"></div>
            <h1>Cuckoo Dashboard</h1>
        </div>
        <div class="hdr-center">
            <div class="hdr-clock-box">
                <span class="hdr-clock-ampm" id="hdrAmpm">AM</span>
                <span class="hdr-clock" id="hdrClock">--:--:--</span>
                <span class="hdr-badge" id="hdrRate"></span>
            </div>
        </div>
        <div class="hdr-r">
            <span class="hdr-latency" id="hdrLatency" title="看板与服务器的 WebSocket 往返延迟"><i class="latency-dot"></i><span class="latency-val">--</span></span>
            <span class="hdr-date" id="hdrDate">--</span>
        </div>
    </div>

    <!-- 左栏：系统信息 -->
    <div class="card sysCard" id="sysCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>系统信息<span class="svc-dot" id="dot-system"></span></span>
        </div>
        <div class="card-body" id="sysMain">
            <div class="hw-main">
                <div class="hw-main-item"><div class="skeleton" style="width:76px;height:76px;border-radius:50%;"></div><div class="skeleton" style="width:44px;height:9px;margin-top:6px;"></div></div>
                <div class="hw-main-item"><div class="skeleton" style="width:76px;height:76px;border-radius:50%;"></div><div class="skeleton" style="width:44px;height:9px;margin-top:6px;"></div></div>
                <div class="hw-main-item"><div class="skeleton" style="width:76px;height:76px;border-radius:50%;"></div><div class="skeleton" style="width:44px;height:9px;margin-top:6px;"></div></div>
            </div>
        </div>
    </div>

    <!-- 左栏：磁盘 -->
    <div class="card diskCard" id="diskCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>磁盘</span>
        </div>
        <div class="card-body dk-section" id="sysDisks">
            <div class="skeleton" style="height:9px;width:70%;margin-bottom:4px;"></div>
            <div class="skeleton" style="height:5px;width:100%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:9px;width:60%;margin-bottom:4px;"></div>
            <div class="skeleton" style="height:5px;width:100%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:9px;width:65%;margin-bottom:4px;"></div>
            <div class="skeleton" style="height:5px;width:100%;"></div>
        </div>
    </div>

    <!-- 网络状态 -->
    <div class="card netCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>网络</span>
        </div>
        <div class="card-body net-rows">
            <div class="net-row">
                <span class="net-icon up">↑</span>
                <span class="net-label">上传</span>
                <span class="net-value" id="netUp">-- <span class="net-unit">KB/s</span></span>
            </div>
            <div class="net-row">
                <span class="net-icon down">↓</span>
                <span class="net-label">下载</span>
                <span class="net-value" id="netDown">-- <span class="net-unit">KB/s</span></span>
            </div>
        </div>
    </div>

    <!-- 开机时间 -->
    <div class="card uptimeCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>已运行</span>
        </div>
        <div class="card-body uptime-body">
            <span class="uptime-val" id="uptimeVal">--</span>
        </div>
    </div>

    <!-- 右栏：Vibe Coding & 今日消耗 -->
    <div class="card tokenCard" id="vibeCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>Vibe Coding<span class="svc-dot" id="dot-vibe"></span></span>
            <span class="card-head-r">
                <span class="vibe-toggle" id="vibeToggle" data-action="toggle-vibe">
                    <span class="dot"></span><span id="vibeToggleLabel">Chilling</span>
                </span>
            </span>
        </div>
        <div class="card-body" style="position:relative;">
            <div class="combined">
                <div class="combined-left">
                    <div style="position:relative;">
                        <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
                            <circle class="ring-bg" cx="45" cy="45" r="35"/>
                            <circle class="ring-fg" id="ringFg" cx="45" cy="45" r="35"
                                stroke-dasharray="219.9" stroke-dashoffset="219.9"/>
                        </svg>
                        <div class="ring-center">
                            <div class="ring-pct" id="ringPct">--%</div>
                            <div class="ring-label" id="ringLabel">-- / --</div>
                        </div>
                    </div>
                </div>
                <div class="combined-right" id="modelBars">
                    <div class="bar-row"><div class="skeleton" style="width:60px;height:9px;"></div><div class="skeleton" style="flex:1;height:12px;margin-left:4px;"></div></div>
                    <div class="bar-row"><div class="skeleton" style="width:60px;height:9px;"></div><div class="skeleton" style="flex:1;height:12px;margin-left:4px;"></div></div>
                </div>
            </div>
            <div class="today-sep"></div>
            <div class="today-top">
                <span class="today-big" id="todayTotal">--</span>
                <span class="today-big-sub">总 Token</span>
            </div>
            <div class="stacked-wrap">
                <div class="stacked-bar">
                    <div class="stacked-seg s-cache" id="segCache" style="width:34%"></div>
                    <div class="stacked-seg s-in" id="segIn" style="width:33%"></div>
                    <div class="stacked-seg s-out" id="segOut" style="width:33%"></div>
                </div>
            </div>
            <div class="legend">
                <div class="leg-row"><span class="leg-dot" style="background:var(--stack-cache)"></span>缓存命中<b id="todayCache">--</b><span class="leg-pct" id="todayCachePct"></span></div>
                <div class="leg-row"><span class="leg-dot" style="background:var(--accent)"></span>未命中<b id="todayIn">--</b><span class="leg-pct" id="todayInPct"></span></div>
                <div class="leg-row"><span class="leg-dot" style="background:var(--crimson)"></span>输出<b id="todayOut">--</b><span class="leg-pct" id="todayOutPct"></span></div>
            </div>
        </div>
        <!-- 未配置余额时保持隐藏；由 dashboard.js 按配置动态生成最多两个条目。 -->
        <div class="card-foot vibe-balances" id="vibeBalances" hidden></div>
    </div>

    <!-- 左下：歌词播放器 -->
    <div class="card lyric-wrap" id="lyricCard">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>播放器<span class="svc-dot" id="dot-media"></span></span>
            <span class="card-head-r">
                <a class="player-btn music-stage-link" href="/music" title="打开音乐舞台">🎛</a>
                <span class="player-ctrl">
                    <button class="player-btn" data-action="player-control" data-player-action="prev" title="上一首">⏮</button>
                    <button class="player-btn" data-action="player-control" data-player-action="toggle" title="播放/暂停">⏯</button>
                    <button class="player-btn" data-action="player-control" data-player-action="next" title="下一首">⏭</button>
                </span>
            </span>
        </div>
        <div class="card-body lyric-text" id="lyricText">
            <div class="lyric-scroll" id="lyricScroll"></div>
            <div class="lyric-idle" id="lyricIdle">未在播放</div>
        </div>
        <div class="card-foot">
            <span class="card-foot-l" id="lyricTitle">--</span>
            <span class="lyric-offset-wrap">
                <button class="lyric-offset-btn" data-action="adjust-lyric-offset" data-delta="-0.5">−</button>
                <span class="lyric-offset-val" id="lyricOffsetVal">0.0</span>
                <button class="lyric-offset-btn" data-action="adjust-lyric-offset" data-delta="0.5">+</button>
            </span>
            <span class="card-foot-r" id="lyricArtist">--</span>
        </div>
    </div>

    <!-- 右下：GitHub -->
    <div class="card gh-wrap">
        <div class="card-head">
            <span class="card-head-l"><span class="bar"></span>GitHub 贡献<span class="svc-dot" id="dot-github"></span></span>
        </div>
        <div class="card-body gh-grid" id="ghGrid">
            <div class="skeleton" style="flex:1; width:100%;"></div>
        </div>
        <div class="card-foot">
            <span class="card-foot-l" id="ghUser"></span>
            <span class="card-foot-r" id="ghTotal"></span>
        </div>
    </div>
</div>

<script src="/static/lib/html2canvas.min.js"></script>
<script type="module" src="/static/modules/dashboard/main.js"></script>
</body>
</html>
